// Job definition and lifecycle state (mirrors `coppice_core::job`).
//
// The job machine is deliberately coarse and user-visible (ADR 0013); all
// execution detail lives on the attempt. JobState is a message with a oneof:
// its one live-execution arm, Attempting, *carries* the attempt it points at,
// so the job↔attempt link is the state itself, not a field beside it
// (ADR 0030, amending ADR 0013). The unit states are empty per-variant
// messages, matching the AttemptOutcome house style so any arm can grow
// fields later without restructuring; the abort request and attempt outcomes
// stay data-bearing messages of their own.

syntax = "proto3";

package coppice.core.v1;

import "coppice/core/v1/ids.proto";
import "coppice/core/v1/resource.proto";

// A job as submitted by a user, plus the metadata needed to schedule it.
message Job {
  JobId id = 1;
  // Container image reference to execute.
  string image = 2;
  // Resources requested for scheduling and isolation.
  Resources requests = 3;
  // User-chosen priority. A multiplier on the job's cost, not a free lane
  // (ADR 0005). The API resolves it through the replicated multiplier table
  // at proposal time; apply never sees this raw value in arithmetic.
  sint32 priority = 4;
  // Enforced runtime bound in microseconds. Part of the job's price and the
  // license to backfill (ADR 0014); absent means the job never touches
  // pledged capacity and is charged a policy default runtime.
  optional uint64 max_runtime_us = 5;
  // The quota-entity leaf this job charges (every ancestor on its path too).
  QuotaEntityId quota_entity = 6;
  RetryPolicy retry = 7;
  // Present iff the user has requested an abort (ADR 0013). Legal in every
  // non-terminal state; once set, finalization never resolves to a retry.
  AbortRequest abort_requested = 8;
  // The container command line, pre-tokenized (argv semantics, no shell
  // parsing). Required on every job: an empty repeated field is
  // indistinguishable from an absent one on the wire, so conversion rejects
  // an empty command outright.
  repeated string command = 9;
  // Entrypoint override; absent runs the image's own entrypoint.
  Entrypoint entrypoint = 10;
}

// An entrypoint override for a job's container. A message rather than a
// bare `repeated string` on Job so the override has real presence: absent
// means "use the image entrypoint", and the only encoding of that meaning
// is absence — a present-but-empty argv is rejected at conversion.
message Entrypoint {
  repeated string argv = 1;
}

// Per-job retry policy. Bounds attempts beyond the first; `Revoked` outcomes
// never consume this budget.
message RetryPolicy {
  uint32 max_retries = 1;
  // Opt-in to retrying user-error outcomes (nonzero exit, OOM). Never
  // applies to MaxRuntimeExceeded (deterministic recurrence) or aborts.
  bool retry_user_errors = 2;
}

// A committed user request to abort a job. The job only terminates ABORTED
// if the abort mechanism actually stopped it — a natural exit that wins the
// race keeps its real outcome, with this record still visible in history.
message AbortRequest {
  // Optional user-supplied reason, surfaced in job history and events.
  optional string reason = 1;
  // When the abort was committed (proposer-stamped, Unix µs).
  int64 requested_at_us = 2;
  // Tag 3 is earmarked for requester identity, pending the identity ADR.
}

// The lifecycle state of a job. Authoritative, Raft-replicated.
//
// A oneof rather than a flat enum: the single live-execution state,
// Attempting, carries the id of the attempt in flight, so "at most one
// attempt in flight" is structural and there is no live state without an
// attempt (ADR 0030). Unit states are empty messages so any arm can grow
// fields later without restructuring, per the AttemptOutcome house style.
// UIs join the carried attempt's own state for detail (the
// preparing/running/finalizing distinctions live on the attempt now).
message JobState {
  // Recorded durably; awaiting admission evaluation.
  message Submitted {}
  // Passed admission (synchronous in v1; distinct for observability).
  message Accepted {}
  // Waiting, unpinned. Ordered by effective score, not arrival.
  message Queued {}
  // An attempt is in flight — the id it carries is the single attempt this
  // job is pursuing (accruing, ready, dispatching, running, or finalizing;
  // the attempt's own state carries that detail). "At most one attempt in
  // flight" is structural: there is no second slot (ADR 0030).
  message Attempting {
    AttemptId attempt = 1;
  }
  // Terminal: the final attempt exited successfully.
  message Succeeded {}
  // Terminal: failed and retries are exhausted or inapplicable.
  message Failed {}
  // Terminal: stopped by the abort mechanism (and only then).
  message Aborted {}

  oneof state {
    Submitted submitted = 1;
    Accepted accepted = 2;
    Queued queued = 3;
    Attempting attempting = 4;
    Succeeded succeeded = 5;
    Failed failed = 6;
    Aborted aborted = 7;
  }
}
