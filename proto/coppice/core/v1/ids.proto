// Strongly-typed identifiers (mirrors `coppice_core::id`).
//
// Every id is a distinct message wrapping the 16 raw bytes of a UUID so that,
// exactly as in the Rust domain model, a JobId can never be passed where a
// NodeId is expected — in generated code and in any future non-Rust tooling.
// The 16-byte length is validated at the conversion boundary, never assumed
// by decoders.
//
// Note: Raft *coordinator* node ids are allocate-once integers (ADR 0016) and
// live in coppice.raft.v1; NodeId here identifies a compute node.

syntax = "proto3";

package coppice.core.v1;

// Identifies a submitted job across its whole lifecycle.
message JobId {
  bytes value = 1;
}

// Identifies a compute node registered with the coordinator.
message NodeId {
  bytes value = 1;
}

// Identifies a single placement of a job onto a node.
message AllocationId {
  bytes value = 1;
}

// Identifies one execution attempt of a job (retries produce new attempts).
message AttemptId {
  bytes value = 1;
}

// Identifies a placement group whose attempts share the `Ready` barrier
// (gang scheduling). v1 groups are singletons: one job, one group, and the
// group id equals the job id.
message GroupId {
  bytes value = 1;
}

// Identifies a node in the quota-entity tree (ADR 0005).
message QuotaEntityId {
  bytes value = 1;
}
