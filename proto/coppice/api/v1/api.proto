// Public API request/response types.
//
// The HTTP surface is JSON at the edge mapped onto these same messages
// (ADR 0003, proto3 JSON mapping) — endpoints are durable state
// transitions, not imperative worker control. Field names here are part of
// the JSON contract; see docs/architecture/schema-style.md.

syntax = "proto3";

package coppice.api.v1;

import "coppice/core/v1/allocation.proto";
import "coppice/core/v1/attempt.proto";
import "coppice/core/v1/ids.proto";
import "coppice/core/v1/job.proto";
import "coppice/core/v1/node.proto";
import "coppice/core/v1/resource.proto";

// Submit a new job. The client mints the JobId, the API resolves
// `priority` through the replicated multiplier table and proposes
// SubmitJob.
//
// The client-minted `job` id is the submission's idempotency identity
// (ADR 0026): retrying after a timeout, connection loss, or leader change
// re-sends the identical request, and a repeat whose first attempt already
// committed resolves to the same job — success with the original JobId,
// never a second job. Reusing an id with a *different* payload is rejected.
// The deduplication window is the job's residence in replicated state:
// from the original commit until the terminal record is evicted per the
// retention policy (ADR 0012).
message SubmitJobRequest {
  string image = 1;
  coppice.core.v1.Resources requests = 2;
  sint32 priority = 3;
  // Enforced runtime bound; part of the job's price and its license to
  // backfill. Absent = charged the policy default runtime.
  optional uint64 max_runtime_us = 4;
  // The quota-entity leaf to charge.
  coppice.core.v1.QuotaEntityId quota_entity = 5;
  coppice.core.v1.RetryPolicy retry = 6;
  // Client-minted job identity (`job-<uuid>`, ADR 0024) — required. Mint a
  // fresh id per logical submission; reuse it verbatim on every retry.
  coppice.core.v1.JobId job = 7;
  // The container command line, pre-tokenized (argv semantics, no shell
  // parsing) — required and non-empty, mirroring core.v1.Job.command.
  repeated string command = 8;
  // Entrypoint override; absent runs the image's own entrypoint.
  coppice.core.v1.Entrypoint entrypoint = 9;
}

message SubmitJobResponse {
  // Echo of the client-minted id from the request.
  coppice.core.v1.JobId job = 1;
  // Raft log index at which this request's command applied. Pair it with a
  // strong read for read-your-writes (ADR 0007). On an idempotent repeat
  // this is the repeat's own apply index, which is ≥ the original commit
  // and therefore still a valid read-your-writes cursor for the job.
  uint64 log_index = 2;
}

// Abort a job: commits a desired-state transition; it does not
// synchronously stop the container. Legal in any non-terminal state; the
// job terminates Aborted only if this mechanism actually stopped it.
message AbortJobRequest {
  coppice.core.v1.JobId job = 1;
  // Optional reason, recorded in job history and events.
  optional string reason = 2;
}

message AbortJobResponse {}

// ---------------------------------------------------------------------------
// Nodes — read-model types for the nodes API (ADR 0031).
// ---------------------------------------------------------------------------

// Liveness, derived from agent heartbeats (epoch fencing per ADR 0009).
// Not replicated — the coordinator derives it at read time.
enum NodeHealth {
  NODE_HEALTH_UNSPECIFIED = 0;
  NODE_HEALTH_HEALTHY = 1;
  NODE_HEALTH_LOST = 2;
}

// Summary of a compute node's current state for the list view.
message NodeSummary {
  coppice.core.v1.NodeId id = 1;
  coppice.core.v1.Resources capacity = 2;
  // Sum of funded resources across non-Released allocations.
  coppice.core.v1.Resources allocated = 3;
  // Actual measured consumption (agent telemetry); zero until agents report.
  coppice.core.v1.Resources used = 4;
  repeated coppice.core.v1.Label labels = 5;
  // False = draining: no new placements, running work continues.
  bool schedulable = 6;
  NodeHealth health = 7;
  // Bumps on (re)registration or loss; fences stale agent commands.
  uint64 epoch = 8;
  // Last heartbeat from the agent; absent until agents report.
  optional int64 last_heartbeat_us = 9;
  // Attempts currently in Running state on this node.
  uint32 running_count = 10;
  // Allocations currently in Accruing state on this node.
  uint32 accruing_count = 11;
}

message ListNodesResponse {
  repeated NodeSummary nodes = 1;
}

message GetNodeResponse {
  NodeSummary summary = 1;
  // Attempts in Dispatching, Running, or Finalizing on this node.
  repeated AttemptView active_attempts = 2;
  // Accruing allocations queued against this node, in funding order.
  repeated AccrualView accrual_queue = 3;
}

// ---------------------------------------------------------------------------
// Shared read-model projections (reused across nodes/jobs endpoints).
// ---------------------------------------------------------------------------

// Read-model projection of an attempt with its charge metadata.
message AttemptView {
  coppice.core.v1.AttemptId id = 1;
  coppice.core.v1.JobId job = 2;
  coppice.core.v1.NodeId node = 3;
  coppice.core.v1.AllocationId allocation = 4;
  coppice.core.v1.AttemptState state = 5;
  optional int64 started_at_us = 6;
  optional int64 ended_at_us = 7;
  // µCU per second while running (from cost weights × requested resources).
  uint64 rate_ucu_per_second = 8;
  // Upfront charge for this attempt (trued-up at finalization).
  uint64 charged_ucu = 9;
}

// Read-model projection of an allocation.
message AllocationView {
  coppice.core.v1.AllocationId id = 1;
  coppice.core.v1.JobId job = 2;
  coppice.core.v1.AttemptId attempt = 3;
  coppice.core.v1.NodeId node = 4;
  coppice.core.v1.Resources requested = 5;
  coppice.core.v1.Resources funded = 6;
  coppice.core.v1.AllocationState state = 7;
  // Commit order — drives funding priority within a node.
  uint64 seq = 8;
}

// An accruing allocation with funding progress.
message AccrualView {
  AllocationView allocation = 1;
  FundedFraction funded_fraction = 2;
  // Earliest guaranteed full-funding time; absent when unbounded.
  optional int64 projected_start_us = 3;
}

// Per-dimension funding progress, 0..1.
message FundedFraction {
  double cpu = 1;
  double memory = 2;
  double disk = 3;
}
