name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A new push to a branch supersedes any run still in flight for it. `main` is
# excluded from cancellation so every landed commit keeps a status of its own.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Warnings are errors in CI. Cargo compiles registry dependencies with
  # `--cap-lints allow`, so this only ever fires on first-party code.
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # With no toolchain argument this installs the *active* toolchain, which
      # rust-toolchain.toml pins — so CI and a developer machine run the very
      # same rustfmt/clippy binaries. Components come from that file too.
      - run: rustup toolchain install --no-self-update
      # No compilation here, so no dependency cache is worth restoring.
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install --no-self-update
      - uses: Swatinem/rust-cache@v2
      # `--all-targets` reaches tests, benches, and examples — not just the
      # libs. `--locked` fails if Cargo.lock is stale rather than updating it.
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install --no-self-update
      - uses: Swatinem/rust-cache@v2
      # The proto descriptor-set breaking gate (crates/coppice-proto,
      # tests/breaking.rs) runs as part of this; `protox` compiles the schema
      # corpus in-process, so no system `protoc` is needed. The 1M-scale tests
      # are `#[ignore]`d by default and stay that way here.
      - run: cargo test --workspace --all-features --locked

  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      # `build` runs `tsc -b` first, so this is also the typecheck gate.
      - run: npm run build
