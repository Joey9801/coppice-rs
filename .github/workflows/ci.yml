name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A new push to a branch supersedes any run still in flight for it. `main` is
# excluded from cancellation so every landed commit keeps a status of its own.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Warnings are errors in CI. Cargo compiles registry dependencies with
  # `--cap-lints allow`, so this only ever fires on first-party code.
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # With no toolchain argument this installs the *active* toolchain, which
      # rust-toolchain.toml pins — so CI and a developer machine run the very
      # same rustfmt/clippy binaries. Components come from that file too.
      - run: rustup toolchain install --no-self-update
      # No compilation here, so no dependency cache is worth restoring.
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install --no-self-update
      - uses: Swatinem/rust-cache@v2
      # `--all-targets` reaches tests, benches, and examples — not just the
      # libs. `--locked` fails if Cargo.lock is stale rather than updating it.
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install --no-self-update
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      # The proto descriptor-set breaking gate (crates/coppice-proto,
      # tests/breaking.rs) runs as part of this; `protox` compiles the schema
      # corpus in-process, so no system `protoc` is needed. The 1M-scale tests
      # are `#[ignore]`d by default and stay that way here.
      #
      # nextest runs each test in its own process, so a panic that aborts is
      # reported against the test that caused it rather than taking the whole
      # binary down. It does not run doctests — the workspace has none (every
      # `///`/`//!` fence is ```text), so there is no separate `--doc` gate.
      #
      # The `ci` profile (.config/nextest.toml) runs the complete suite,
      # including the heavy integration binaries a plain local `cargo nextest
      # run` skips by default. Docker ships preinstalled on GitHub-hosted
      # ubuntu runners, which docker_executor needs.
      - run: cargo nextest run --workspace --all-features --locked --profile ci

  sqlx-prepare:
    name: sqlx-prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install --no-self-update
      - uses: Swatinem/rust-cache@v2
      # Pinned to the workspace's sqlx minor (0.8): the CLI and the crate's
      # macros share the query-metadata format, and an unpinned `latest` here
      # would let a CLI release break the check without any repo change.
      - uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli@0.8.6
      # Regenerates a scratch sqlite database from the telemetry migrations
      # and verifies the checked-in crates/coppice-agent/.sqlx/ cache matches
      # what `cargo sqlx prepare` would produce today (docs/architecture/
      # docker-executor.md §8.4).
      - run: scripts/sqlx-prepare.sh --check

  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      # `build` runs `tsc -b` first, so this is also the typecheck gate.
      - run: npm run build
